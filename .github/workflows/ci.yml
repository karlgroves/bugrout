name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Format, Lint, Typecheck, Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v7
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Safety net for anything that bypassed the Husky hooks
      - name: Format check
        run: pnpm run format:check

      - name: Lint
        run: pnpm run lint

      - name: Typecheck
        run: pnpm run typecheck

      - name: Test
        run: pnpm run test

      # Catches Expo SDK / native-module mismatches, which typecheck and Jest
      # cannot see: they only read JavaScript source. See issue #30 and ADR 0007.
      - name: Expo SDK alignment (expo-doctor)
        run: pnpm run doctor

      # Builds the real Metro bundle for both native platforms. Catches
      # module-graph failures (bad imports, unresolvable packages, ESM/CJS
      # mismatches) that typecheck cannot see because they are resolution
      # errors, not type errors. Does not compile native code — see issue #30.
      - name: Bundle check (Metro, iOS + Android)
        run: pnpm run bundle:check

      - name: Markdown lint
        run: pnpm run markdownlint

      - name: Duplication
        run: pnpm run dupes

      - name: License compliance
        run: pnpm run license:check

      - name: Audit production dependencies
        run: pnpm run security:audit

      - name: Secret scan (gitleaks)
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
