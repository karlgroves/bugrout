name: Data Pipeline

on:
  schedule:
    - cron: "0 6 * * 0" # Weekly on Sunday at 6am UTC
  workflow_dispatch:
    inputs:
      states:
        description: "Comma-separated state slugs (e.g., california,texas)"
        default: "california"
      upload:
        description: "Upload to R2 after building"
        type: boolean
        default: false

jobs:
  prepare:
    name: Resolve State Matrix
    runs-on: ubuntu-latest
    outputs:
      states: ${{ steps.parse.outputs.states }}
    steps:
      - name: Parse state list
        id: parse
        env:
          STATES: ${{ github.event.inputs.states || 'california' }}
        run: |
          echo "states=$(jq -cn --arg s "$STATES" '$s | split(",") | map(gsub("^\\s+|\\s+$"; ""))')" >> "$GITHUB_OUTPUT"

  build-regions:
    name: Build Regional Packages
    needs: prepare
    runs-on: ubuntu-latest
    timeout-minutes: 180
    strategy:
      matrix:
        state: ${{ fromJson(needs.prepare.outputs.states) }}
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install system dependencies
        run: |
          sudo add-apt-repository -y ppa:valhalla-core/valhalla
          sudo apt-get update
          sudo apt-get install -y valhalla-bin python3

      - name: Install Planetiler
        run: |
          curl -L -o data-pipeline/osm/planetiler.jar \
            https://github.com/onthegomap/planetiler/releases/latest/download/planetiler.jar

      - name: Build regional package
        working-directory: data-pipeline
        run: ./build-region.sh ${{ matrix.state }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: package-${{ matrix.state }}
          path: data-pipeline/output/${{ matrix.state }}/package/
          retention-days: 7

  upload-to-r2:
    name: Upload to Cloudflare R2
    runs-on: ubuntu-latest
    needs: build-regions
    if: ${{ github.event.inputs.upload == 'true' || github.event_name == 'schedule' }}
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install wrangler
        run: npm install -g wrangler

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: data-pipeline/output/

      - name: Upload all regions to R2
        working-directory: data-pipeline
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          for pkg_dir in output/package-*/; do
            STATE=$(basename "$pkg_dir" | sed 's/package-//')
            echo "Uploading $STATE..."

            for file in "$pkg_dir"/*; do
              FILENAME=$(basename "$file")
              wrangler r2 object put "bugrout-tiles/${STATE}/${FILENAME}" \
                --file "$file"
            done
          done

      - name: Build and upload global manifest
        working-directory: data-pipeline
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          for pkg_dir in output/package-*/; do
            STATE=$(basename "$pkg_dir" | sed 's/package-//')
            mkdir -p "output/$STATE/package"
            cp "$pkg_dir"/* "output/$STATE/package/"
          done
          ./build-manifest.sh --upload
